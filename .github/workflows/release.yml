name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test -- src
      - run: npm run lint
      - run: npm run build
      - run: node scripts/create-release-tarball.mjs
      - uses: softprops/action-gh-release@v2
        with:
          files: release/actionpad.tar.gz
